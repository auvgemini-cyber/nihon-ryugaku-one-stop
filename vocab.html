<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5efe4" />
    <title>基础词汇背诵 - 日本留学一站通</title>
    <link rel="stylesheet" href="web/portal.css" />
    <style>
      .vocab-shell {
        width: min(100%, 1180px);
      }

      .vocab-actions {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
      }

      .book-select,
      .unit-select,
      .lesson-select {
        min-height: 40px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fffdf8;
        color: var(--ink);
        font-family: "Hiragino Sans GB","PingFang SC","Microsoft YaHei",sans-serif;
        font-size: 14px;
        font-weight: 800;
        cursor: pointer;
      }

      .vocab-mode-tabs {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        padding: 6px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255,255,255,0.46);
      }

      .vocab-mode-tabs.has-7 {
        grid-template-columns: repeat(4, 1fr);
      }

      .vocab-mode-tabs.has-7 .vocab-mode-tab:nth-child(n+5) {
        grid-column: span 1;
      }

      @media (min-width: 900px) {
        .vocab-mode-tabs.has-7 {
          grid-template-columns: repeat(7, 1fr);
        }
      }

      .vocab-mode-tab {
        min-height: 42px;
        border-radius: 12px;
        background: transparent;
        color: var(--muted);
        font-family: "Hiragino Sans GB","PingFang SC","Microsoft YaHei",sans-serif;
        font-size: 14px;
        font-weight: 800;
      }

      .vocab-mode-tab.is-active {
        background: var(--ink);
        color: #fff9ef;
      }

      .word-display {
        display: grid;
        place-items: center;
        min-height: 160px;
        margin-top: 16px;
        padding: 24px;
        border: 1px solid rgba(32,58,95,0.18);
        border-radius: 20px;
        background: rgba(255,255,255,0.54);
        font-size: 56px;
        font-weight: 900;
        line-height: 1.3;
        text-align: center;
      }

      .word-display .sub {
        display: block;
        font-size: 20px;
        color: var(--muted);
        font-weight: 700;
        margin-top: 8px;
      }

      .word-display .small {
        font-size: 28px;
      }

      .word-display .hint {
        font-size: 18px;
        color: var(--muted);
        font-weight: 700;
      }

      .options-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        margin-top: 14px;
      }

      .options-grid.multi-row {
        grid-template-columns: repeat(3, 1fr);
      }

      .option-btn {
        min-height: 64px;
        padding: 12px;
        border: 2px solid var(--line);
        border-radius: 14px;
        background: #fffdf8;
        color: var(--ink);
        font-family: inherit;
        font-size: 24px;
        font-weight: 900;
        transition: transform .15s, border-color .15s;
      }

      .option-btn:hover:not(:disabled) {
        transform: translateY(-2px);
        border-color: rgba(32,58,95,0.35);
      }

      .option-btn.is-correct {
        border-color: var(--green);
        background: rgba(57,112,93,0.12);
      }

      .option-btn.is-wrong {
        border-color: var(--red);
        background: rgba(207,47,36,0.1);
      }

      .option-btn:disabled {
        opacity: 1;
        color: var(--ink);
      }

      .kana-picker {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 14px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255,252,245,0.88);
      }

      .kana-picker .kana-group {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
      }

      .kana-picker .kana-group + .kana-group {
        margin-left: 4px;
        padding-left: 8px;
        border-left: 1px solid var(--line);
      }

      .kana-pick-btn {
        width: 42px;
        height: 42px;
        padding: 0;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fffdf8;
        color: var(--ink);
        font-size: 18px;
        font-weight: 800;
        font-family: inherit;
        transition: transform .12s, background .12s;
      }

      .kana-pick-btn:hover {
        transform: translateY(-1px);
        background: rgba(207,47,36,0.08);
        border-color: rgba(207,47,36,0.35);
      }

      .kana-pick-btn:active,
      .kana-pick-btn.used {
        background: rgba(207,47,36,0.15);
        border-color: var(--red);
      }

      .spell-area {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        min-height: 52px;
        margin-top: 12px;
        padding: 12px 16px;
        border: 2px dashed var(--line-strong);
        border-radius: 14px;
        background: rgba(255,255,255,0.4);
        font-size: 28px;
        font-weight: 900;
        align-items: center;
      }

      .spell-area .slot {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 36px;
        height: 44px;
      }

      .spell-area .slot.filled {
        color: var(--red-dark);
      }

      .spell-area .cursor {
        display: inline-block;
        width: 2px;
        height: 36px;
        background: var(--red);
        animation: blink 0.8s step-end infinite;
      }

      @keyframes blink {
        50% { opacity: 0; }
      }

      .spell-actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      .spell-actions button {
        min-height: 40px;
        padding: 0 18px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #fffdf8;
        font-family: "Hiragino Sans GB","PingFang SC","Microsoft YaHei",sans-serif;
        font-size: 14px;
        font-weight: 800;
        cursor: pointer;
      }

      .spell-actions .submit-btn {
        background: var(--ink);
        color: #fff9ef;
        border-color: transparent;
      }

      .feedback-area {
        min-height: 28px;
        margin-top: 12px;
        font-family: "Hiragino Sans GB","PingFang SC","Microsoft YaHei",sans-serif;
        font-size: 16px;
        font-weight: 800;
        text-align: center;
      }

      .feedback-area.correct { color: var(--green); }
      .feedback-area.wrong { color: var(--red-dark); }

      .nav-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 14px;
      }

      .word-count {
        font-family: "Hiragino Sans GB","PingFang SC","Microsoft YaHei",sans-serif;
        font-size: 14px;
        font-weight: 800;
        color: var(--muted);
        text-align: center;
        margin-top: 6px;
      }

      .browse-list {
        margin-top: 12px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        max-height: 480px;
        overflow-y: auto;
        padding-right: 4px;
      }

      .browse-list::-webkit-scrollbar { width: 4px; }
      .browse-list::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }

      .browse-item {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 6px;
        padding: 8px 12px;
        border-radius: 10px;
        background: rgba(255,252,245,0.7);
        border: 1px solid var(--line);
        font-size: 15px;
        line-height: 1.5;
      }

      .browse-item .ja {
        font-weight: 900;
      }

      .browse-item .zh {
        color: var(--muted);
        font-family: "Hiragino Sans GB","PingFang SC","Microsoft YaHei",sans-serif;
        font-size: 13px;
      }

      .browse-item .kanji-hint {
        font-size: 13px;
        color: var(--muted);
      }

      @media (max-width: 760px) {
        .browse-list {
          grid-template-columns: repeat(2, 1fr);
        }
        .vocab-mode-tabs {
          grid-template-columns: repeat(2, 1fr);
        }
        .options-grid.multi-row {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      .accent-mark {
        color: var(--accent);
        font-size: 0.7em;
        vertical-align: super;
        margin-left: 1px;
        font-weight: 700;
      }

      @media (max-width: 520px) {
        .browse-list {
          grid-template-columns: 1fr;
        }
        .word-display {
          font-size: 40px;
          min-height: 120px;
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell vocab-shell">
      <section class="panel module-panel" aria-label="基础词汇背诵">
        <div class="module-panel-head">
          <div>
            <p class="section-kicker">N4 Module · 词汇</p>
            <h1>基础词汇背诵</h1>
            <p>教材词汇表，按单元和课次整理。选择目标课程后进入练习模式。</p>
          </div>
          <div class="vocab-actions">
            <a class="ghost-action" href="index.html">返回首页</a>
            <div class="score-box" aria-label="答题统计">
              <span id="correctCount">0</span>
              <span id="answeredCount">/0</span>
            </div>
          </div>
        </div>

        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;" id="selectionBar">
          <select class="book-select" id="bookSelect"></select>
          <select class="unit-select" id="unitSelect"></select>
          <select class="lesson-select" id="lessonSelect"></select>
        </div>

        <div class="vocab-mode-tabs has-7" role="tablist" aria-label="练习模式" id="modeTabs">
          <button class="vocab-mode-tab is-active" type="button" data-vocab-mode="browse">浏览单词</button>
          <button class="vocab-mode-tab" type="button" data-vocab-mode="listen">听音选假名</button>
          <button class="vocab-mode-tab" type="button" data-vocab-mode="kana2zh">看假名选中文</button>
          <button class="vocab-mode-tab" type="button" data-vocab-mode="spell">看中文拼假名</button>
          <button class="vocab-mode-tab" type="button" data-vocab-mode="listenKanji">听音选汉字</button>
          <button class="vocab-mode-tab" type="button" data-vocab-mode="kana2kanji">看假名选汉字</button>
          <button class="vocab-mode-tab" type="button" data-vocab-mode="kanji2kana">看汉字选假名</button>
        </div>

        <div id="practiceArea"></div>
      </section>
    </main>
    <script src="data/vocab.js"></script>
    <script src="data/kana_grid.js"></script>
    <script src="web/vocab.js"></script>
  </body>
</html>
